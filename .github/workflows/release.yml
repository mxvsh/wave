name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Update version in project
        run: |
          perl -0pi -e "s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${VERSION#v};/g" Wave.xcodeproj/project.pbxproj

      - name: Build app
        run: |
          xcodebuild \
            -project Wave.xcodeproj \
            -scheme Wave \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: make DMG_NAME="Wave-${VERSION}" dmg

      - name: Create ZIP for Sparkle
        run: make zip

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          GENERATE_APPCAST="build/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"
          DOWNLOAD_PREFIX="https://github.com/${{ github.repository }}/releases/download/${VERSION}"
          echo "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            updates/releases/

      - name: Commit updated appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/releases/appcast.xml
          git commit -m "chore: update appcast for ${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '## Wave %s\n\nDownload `Wave-%s.dmg`, open it, and drag Wave to your Applications folder.\n\n> **Note:** The app is ad-hoc signed. On first launch, right-click → Open to bypass Gatekeeper.\n\nAutomatic updates are delivered via the built-in updater.\n' \
            "${VERSION}" "${VERSION}" > release_notes.md
          gh release create "${VERSION}" \
            "Wave-${VERSION}.dmg" \
            "updates/releases/Wave.zip" \
            --title "Wave ${VERSION}" \
            --notes-file release_notes.md \
            --latest
